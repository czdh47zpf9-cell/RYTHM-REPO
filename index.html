<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rhythm">
<meta name="theme-color" content="#0A1222">
<link rel="apple-touch-icon" href="icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<title>UNO Smalls Rhythm Tracker</title>
<script>try{var t=localStorage.getItem('uno-rhythm-theme')||'dark';document.documentElement.setAttribute('data-theme',t);}catch(e){}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Sora:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  html[data-theme="dark"]{
    --bg:#0A1222; --glow:#16233f;
    --panel:#1A2843; --panel-2:#243559;
    --line:rgba(130,165,255,.12);
    --blue:#3B8DFF; --blue-dim:#2c4a7e; --cyan:#2BD4EE; --purple:#8B5CF6;
    --text:#EAF1FF; --muted:#9DACCB; --bad:#F0617A;
    --led-off:#2a3a5c; --meter-bg:#16233f; --pad-bg:#16233f; --pad-text:#04221f;
    --btn-text:#FFFFFF; --check-border:#3b4d72; --empty:#69789c;
    --badge-earned-bg:#1E2D4B; --sig:#4a5878;
    --readout-shadow:0 12px 40px -20px rgba(59,141,255,.45);
    --banner-bg:rgba(240,97,122,.12); --banner-border:rgba(240,97,122,.5); --banner-text:#ffb3c0; --banner-strong:#ffd7df;
  }
  html[data-theme="light"]{
    --bg:#E7EDF7; --glow:#D3E0F5;
    --panel:#FFFFFF; --panel-2:#F2F6FC;
    --line:rgba(30,55,110,.13);
    --blue:#2E6FF2; --blue-dim:#9bb8ee; --cyan:#0EA5C4; --purple:#7C3AED;
    --text:#17223B; --muted:#5C6B89; --bad:#D14B63;
    --led-off:#CBD6E8; --meter-bg:#DCE6F4; --pad-bg:#EEF3FB; --pad-text:#053b36;
    --btn-text:#FFFFFF; --check-border:#BBC8DE; --empty:#8A97B5;
    --badge-earned-bg:#EAF1FE; --sig:#9AA7C0;
    --readout-shadow:0 8px 24px -16px rgba(46,111,242,.28);
    --banner-bg:#FDECEF; --banner-border:#F3B5C0; --banner-text:#B23A50; --banner-strong:#8E2438;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:radial-gradient(120% 60% at 50% -8%, var(--glow) 0%, transparent 55%), var(--bg);
    color:var(--text); font-family:'Sora',system-ui,sans-serif; -webkit-font-smoothing:antialiased; min-height:100vh;
    transition:background .25s, color .25s;
    padding:calc(env(safe-area-inset-top) + 18px) calc(env(safe-area-inset-right) + 16px) calc(env(safe-area-inset-bottom) + 40px) calc(env(safe-area-inset-left) + 16px);
  }
  .wrap{max-width:480px;margin:0 auto;}

  .banner{display:none;background:var(--banner-bg);border:1px solid var(--banner-border);color:var(--banner-text);font-size:13px;line-height:1.5;border-radius:12px;padding:12px 14px;margin-bottom:16px;}
  .banner.show{display:block;}
  .banner b{color:var(--banner-strong);}

  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
  .mark{line-height:.82;}
  .mark .uno{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.32em;color:var(--muted);display:block;margin-bottom:7px;text-transform:uppercase;}
  .mark .rhythm{font-family:'Anton',sans-serif;font-size:40px;letter-spacing:.01em;text-transform:uppercase;color:var(--text);}
  .mark .rhythm b{color:var(--blue);font-weight:400;}
  .rec{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.18em;color:var(--muted);display:flex;align-items:center;gap:6px;text-transform:uppercase;}
  .rec .dot{width:8px;height:8px;border-radius:50%;background:var(--blue);box-shadow:0 0 10px var(--blue);animation:pulse 2s infinite;}
  .rec.saved{color:var(--cyan);}
  .rec.saved .dot{background:var(--cyan);box-shadow:0 0 10px var(--cyan);animation:none;}
  .rec.blocked{color:var(--bad);}
  .rec.blocked .dot{background:var(--bad);box-shadow:0 0 10px var(--bad);animation:none;}

  .weekbar{display:flex;align-items:center;justify-content:space-between;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin:4px 0 14px;}
  .navbtn{background:var(--panel);border:1px solid var(--line);color:var(--text);width:34px;height:30px;border-radius:8px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .navbtn:active{background:var(--panel-2);}
  .navbtn:disabled{opacity:.3;}
  .weeklabel{text-align:center;flex:1;}
  .weeklabel .wk{color:var(--blue);}
  .wktag{display:block;font-size:9px;letter-spacing:.22em;margin-top:4px;color:var(--muted);}
  .wktag.now{color:var(--blue);}
  .wktag.up{color:var(--cyan);}

  .seq{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;margin-bottom:22px;}
  .step{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:9px 0 8px;text-align:center;cursor:pointer;position:relative;transition:border-color .15s, background .15s;}
  .step .dow{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.05em;}
  .step .dom{font-family:'Sora',sans-serif;font-size:16px;font-weight:600;margin-top:2px;}
  .step .led{width:7px;height:7px;border-radius:50%;background:var(--led-off);margin:7px auto 0;transition:background .2s, box-shadow .2s;}
  .step.logged .led{background:var(--blue);box-shadow:0 0 9px var(--blue);}
  .step.sel{border-color:var(--blue);background:var(--panel-2);}
  .step.today .dow{color:var(--blue);}
  .step.today::after{content:"";position:absolute;inset:-1px;border-radius:11px;border:1px solid var(--blue);opacity:.4;animation:pulse 2.4s infinite;pointer-events:none;}

  .readout{background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:18px;padding:20px 18px 16px;margin-bottom:18px;box-shadow:var(--readout-shadow);}
  .readout .lbl{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.28em;color:var(--muted);text-transform:uppercase;}
  .bigscore{display:flex;align-items:baseline;gap:8px;margin-top:6px;}
  .bigscore .n{font-family:'Anton',sans-serif;font-size:64px;line-height:.9;color:var(--blue);}
  .bigscore .d{font-family:'Space Mono',monospace;font-size:16px;color:var(--muted);}
  .meter{height:6px;border-radius:4px;background:var(--meter-bg);overflow:hidden;margin:14px 0 16px;}
  .meter .fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:4px;transition:width .4s ease;}
  .substats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .stat .sv{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--text);}
  .stat .sl{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;margin-top:3px;}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:16px;}
  .panel h2{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin:0 0 13px;font-weight:700;display:flex;justify-content:space-between;align-items:center;}
  .panel h2 .cnt{color:var(--blue);}

  .row{display:flex;gap:9px;margin-bottom:11px;}
  input[type=text]{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:10px;color:var(--text);font-family:'Sora',sans-serif;font-size:15px;padding:11px 12px;outline:none;}
  input[type=text]:focus{border-color:var(--blue-dim);}
  input::placeholder{color:var(--empty);}
  .add{background:var(--blue);color:var(--btn-text);border:none;border-radius:10px;padding:0 16px;font-family:'Sora',sans-serif;font-weight:700;font-size:14px;cursor:pointer;}
  .add:active{filter:brightness(.92);}

  ul{list-style:none;margin:0;padding:0;}
  .item{display:flex;align-items:flex-start;gap:11px;padding:10px 0;border-top:1px solid var(--line);}
  .item:first-child{border-top:none;}
  .check{flex:none;width:22px;height:22px;border-radius:7px;border:1.5px solid var(--check-border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;}
  .check.on{background:var(--blue);border-color:var(--blue);color:var(--btn-text);font-weight:700;}
  .itxt{flex:1;font-size:15px;line-height:1.35;}
  .item.done .itxt{color:var(--muted);text-decoration:line-through;}
  .del{flex:none;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0 2px;line-height:1;opacity:.7;}
  .del:active{color:var(--bad);}
  .winmeta{font-family:'Space Mono',monospace;font-size:10px;color:var(--blue);letter-spacing:.08em;margin-top:3px;}
  .empty{color:var(--empty);font-size:14px;line-height:1.45;padding:4px 0 2px;}

  .rate{display:grid;grid-template-columns:repeat(10,1fr);gap:5px;margin:2px 0 4px;}
  .pad{height:34px;border-radius:8px;background:var(--pad-bg);border:1px solid var(--line);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:11px;color:var(--empty);transition:background .12s,color .12s;}
  .pad.lit{background:var(--cyan);border-color:var(--cyan);color:var(--pad-text);font-weight:700;}
  .pad.tip{box-shadow:0 0 10px var(--cyan);}
  .ratehint{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.1em;margin-top:9px;text-transform:uppercase;}
  .ratehint b{color:var(--cyan);}
  .clr{background:none;border:none;color:var(--muted);font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.1em;cursor:pointer;text-transform:uppercase;text-decoration:underline;}

  .badges{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
  .badge{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:11px 8px;text-align:center;opacity:.45;transition:opacity .2s;}
  .badge.earned{opacity:1;border-color:var(--blue-dim);background:var(--badge-earned-bg);}
  .badge .ic{font-size:20px;}
  .badge .bn{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;margin-top:5px;line-height:1.25;}
  .badge.earned .bn{color:var(--text);}

  .tools{display:flex;gap:9px;margin-top:22px;}
  .tool{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--muted);border-radius:11px;padding:12px 6px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;text-align:center;}
  .tool:active{background:var(--panel-2);color:var(--text);}
  .sig{text-align:center;font-family:'Space Mono',monospace;font-size:10px;color:var(--sig);letter-spacing:.18em;margin-top:22px;text-transform:uppercase;}
  .toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 24px);transform:translateX(-50%) translateY(20px);background:var(--blue);color:#fff;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;padding:11px 18px;border-radius:30px;opacity:0;pointer-events:none;transition:.25s;letter-spacing:.05em;z-index:50;box-shadow:0 8px 30px -8px var(--blue);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
  @media (prefers-reduced-motion: reduce){*{animation:none !important;}}
</style>
</head>
<body>
<div class="wrap">

  <div class="banner" id="banner"></div>

  <div class="topbar">
    <div class="mark">
      <span class="uno">Uno Smalls</span>
      <span class="rhythm"><b>Rhythm</b> Tracker</span>
    </div>
    <div class="rec" id="saveStat"><span class="dot" id="saveDot"></span><span id="saveTxt">Live</span></div>
  </div>

  <div class="weekbar">
    <button class="navbtn" id="prevWk">‹</button>
    <div class="weeklabel"><div><span class="wk" id="wkNum"></span> · <span id="wkRange"></span></div><span class="wktag" id="wkTag"></span></div>
    <button class="navbtn" id="nextWk">›</button>
  </div>

  <div class="seq" id="seq"></div>

  <div class="readout">
    <div class="lbl">Week Rhythm</div>
    <div class="bigscore"><span class="n" id="weekScore">—</span><span class="d">/ 10</span></div>
    <div class="meter"><div class="fill" id="weekFill" style="width:0%"></div></div>
    <div class="substats">
      <div class="stat"><div class="sv" id="stWins">0</div><div class="sl">Wins</div></div>
      <div class="stat"><div class="sv" id="stGoals">0/0</div><div class="sl">Targets</div></div>
      <div class="stat"><div class="sv" id="stDays">0/7</div><div class="sl">Days Logged</div></div>
    </div>
  </div>

  <div class="panel">
    <h2>Week Targets <span class="cnt" id="goalCnt"></span></h2>
    <div class="row">
      <input type="text" id="goalIn" placeholder="What has to happen this week?">
      <button class="add" id="goalAdd">Set</button>
    </div>
    <ul id="goalList"></ul>
  </div>

  <div class="panel">
    <h2 id="dayTitle">Today</h2>
    <div class="lbl" style="font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.24em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;">Rate the day</div>
    <div class="rate" id="rate"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div class="ratehint" id="rateHint">Tap to set</div>
      <button class="clr" id="rateClr" style="display:none;">Clear</button>
    </div>
    <div style="height:14px;"></div>
    <div class="row">
      <input type="text" id="winIn" placeholder="Log a win…">
      <button class="add" id="winAdd">Add</button>
    </div>
    <ul id="dayWins"></ul>
  </div>

  <div class="panel">
    <h2>Week Wins <span class="cnt" id="winTotal"></span></h2>
    <ul id="weekWins"></ul>
  </div>

  <div class="panel">
    <h2>Trophies</h2>
    <div class="badges" id="badges"></div>
  </div>

  <div class="tools">
    <button class="tool" id="exportBtn">⤓ Export</button>
    <button class="tool" id="importBtn">⤒ Import</button>
    <button class="tool" id="themeBtn">☀ Light</button>
  </div>
  <input type="file" id="fileIn" accept="application/json" style="display:none;">

  <div class="sig">Change your world · 31</div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  const KEY = "uno-rhythm-tracker-v1";
  const THEME_KEY = "uno-rhythm-theme";
  const DOW = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const MON = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];

  let state = load();
  let viewDate = new Date();
  let selDate = todayKey();

  function load(){ try{ const r=localStorage.getItem(KEY); if(r) return JSON.parse(r); }catch(e){} return { weeks:{} }; }
  function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); flashSaved(true); }catch(e){ flashSaved(false); showBlocked(); } }

  function todayKey(){ return dKey(new Date()); }
  function dKey(d){ const x=new Date(d); return x.getFullYear()+"-"+pad(x.getMonth()+1)+"-"+pad(x.getDate()); }
  function pad(n){ return String(n).padStart(2,"0"); }
  function startOfWeek(d){ const x=new Date(d); x.setHours(0,0,0,0); x.setDate(x.getDate()-x.getDay()); return x; }
  function weekDates(d){ const s=startOfWeek(d); return Array.from({length:7},(_,i)=>{ const x=new Date(s); x.setDate(s.getDate()+i); return x; }); }
  function isoWeek(d){
    const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
    const dn=(date.getUTCDay()+6)%7; date.setUTCDate(date.getUTCDate()-dn+3);
    const ft=new Date(Date.UTC(date.getUTCFullYear(),0,4));
    const fdn=(ft.getUTCDay()+6)%7; ft.setUTCDate(ft.getUTCDate()-fdn+3);
    return { year:date.getUTCFullYear(), week:1+Math.round((date-ft)/(7*864e5)) };
  }
  function midWeek(d){ const m=new Date(startOfWeek(d)); m.setDate(m.getDate()+3); return m; }
  function weekKey(d){ const w=isoWeek(midWeek(d)); return w.year+"-W"+pad(w.week); }
  function weeksFromNow(d){ return Math.round((startOfWeek(d)-startOfWeek(new Date()))/(7*864e5)); }

  function getWeek(){ const k=weekKey(viewDate); if(!state.weeks[k]) state.weeks[k]={goals:[],days:{}}; return state.weeks[k]; }
  function getDay(key){ const w=getWeek(); if(!w.days[key]) w.days[key]={rating:null,wins:[]}; return w.days[key]; }

  function addGoal(t){ t=t.trim(); if(!t) return; getWeek().goals.push({id:uid(),text:t,done:false}); save(); render(); toast("Saved \u2713"); }
  function toggleGoal(id){ const g=getWeek().goals.find(x=>x.id===id); if(g){g.done=!g.done; save(); render();} }
  function delGoal(id){ const w=getWeek(); w.goals=w.goals.filter(x=>x.id!==id); save(); render(); }
  function setRating(n){ const d=getDay(selDate); d.rating=(d.rating===n)?null:n; save(); render(); }
  function clearRating(){ getDay(selDate).rating=null; save(); render(); }
  function addWin(t){ t=t.trim(); if(!t) return; getDay(selDate).wins.push({id:uid(),text:t,ts:Date.now()}); save(); render(); toast("Saved \u2713"); }
  function delWin(key,id){ const d=getDay(key); d.wins=d.wins.filter(x=>x.id!==id); save(); render(); }
  function uid(){ return Math.random().toString(36).slice(2,9); }

  function render(){
    const w=getWeek();
    const dates=weekDates(viewDate);
    const iw=isoWeek(midWeek(viewDate));
    document.getElementById("wkNum").textContent="WK "+iw.week;
    const a=dates[0], b=dates[6];
    document.getElementById("wkRange").textContent = MON[a.getMonth()]+" "+a.getDate()+" – "+(a.getMonth()===b.getMonth()?b.getDate():MON[b.getMonth()]+" "+b.getDate());

    const tag=document.getElementById("wkTag"); const wf=weeksFromNow(viewDate);
    if(wf===0){ tag.textContent="THIS WEEK"; tag.className="wktag now"; }
    else if(wf>0){ tag.textContent=wf===1?"NEXT WEEK · PLANNING":"+"+wf+" WEEKS · PLANNING"; tag.className="wktag up"; }
    else { tag.textContent=wf===-1?"LAST WEEK":Math.abs(wf)+" WEEKS BACK"; tag.className="wktag"; }
    document.getElementById("nextWk").disabled = wf>=12;

    const seq=document.getElementById("seq"); seq.innerHTML="";
    dates.forEach((d,i)=>{
      const key=dKey(d), day=w.days[key];
      const logged = day && (day.rating!=null || (day.wins&&day.wins.length));
      const el=document.createElement("div");
      el.className="step"+(logged?" logged":"")+(key===selDate?" sel":"")+(key===todayKey()?" today":"");
      el.innerHTML='<div class="dow">'+DOW[i]+'</div><div class="dom">'+d.getDate()+'</div><div class="led"></div>';
      el.onclick=()=>{ selDate=key; render(); };
      seq.appendChild(el);
    });

    const rated=Object.values(w.days).filter(d=>d.rating!=null);
    const avg = rated.length ? rated.reduce((s,d)=>s+d.rating,0)/rated.length : null;
    document.getElementById("weekScore").textContent = avg==null ? "—" : avg.toFixed(1);
    document.getElementById("weekFill").style.width = (avg==null?0:avg*10)+"%";

    const winCount=Object.values(w.days).reduce((s,d)=>s+(d.wins?d.wins.length:0),0);
    const goalsDone=w.goals.filter(g=>g.done).length;
    const daysLogged=Object.values(w.days).filter(d=>d.rating!=null||(d.wins&&d.wins.length)).length;
    document.getElementById("stWins").textContent=winCount;
    document.getElementById("stGoals").textContent=goalsDone+"/"+w.goals.length;
    document.getElementById("stDays").textContent=daysLogged+"/7";

    document.getElementById("goalCnt").textContent = w.goals.length?goalsDone+"/"+w.goals.length:"";
    const gl=document.getElementById("goalList"); gl.innerHTML="";
    if(!w.goals.length){ gl.innerHTML='<li class="empty">No targets yet. Contact that artist. Finish that patch. Name it.</li>'; }
    w.goals.forEach(g=>{
      const li=document.createElement("li");
      li.className="item"+(g.done?" done":"");
      li.innerHTML='<button class="check'+(g.done?" on":"")+'">'+(g.done?"✓":"")+'</button><span class="itxt">'+esc(g.text)+'</span><button class="del">×</button>';
      li.querySelector(".check").onclick=()=>toggleGoal(g.id);
      li.querySelector(".del").onclick=()=>delGoal(g.id);
      gl.appendChild(li);
    });

    const isToday=selDate===todayKey();
    const sd=new Date(selDate+"T00:00:00");
    document.getElementById("dayTitle").innerHTML = isToday ? "Today" : DOW[sd.getDay()]+" · "+MON[sd.getMonth()]+" "+sd.getDate();

    const dayObj=w.days[selDate]||{rating:null,wins:[]};
    const rate=document.getElementById("rate"); rate.innerHTML="";
    for(let i=1;i<=10;i++){
      const p=document.createElement("div");
      const lit = dayObj.rating!=null && i<=dayObj.rating;
      p.className="pad"+(lit?" lit":"")+(dayObj.rating===i?" tip":"");
      p.textContent=i; p.onclick=()=>setRating(i);
      rate.appendChild(p);
    }
    const hint=document.getElementById("rateHint");
    hint.innerHTML = dayObj.rating==null ? "Tap to set" : "Rated <b>"+dayObj.rating+"</b> / 10";
    document.getElementById("rateClr").style.display = dayObj.rating==null?"none":"block";

    const dw=document.getElementById("dayWins"); dw.innerHTML="";
    if(!dayObj.wins.length){ dw.innerHTML='<li class="empty">No wins logged. Stack the first one.</li>'; }
    dayObj.wins.slice().reverse().forEach(win=>{
      const li=document.createElement("li"); li.className="item";
      li.innerHTML='<span class="itxt">'+esc(win.text)+'</span><button class="del">×</button>';
      li.querySelector(".del").onclick=()=>delWin(selDate,win.id);
      dw.appendChild(li);
    });

    const all=[];
    dates.forEach((d,i)=>{ const key=dKey(d), day=w.days[key]; if(day&&day.wins) day.wins.forEach(win=>all.push({...win,dow:DOW[i]})); });
    all.sort((x,y)=>y.ts-x.ts);
    document.getElementById("winTotal").textContent = all.length?all.length:"";
    const ww=document.getElementById("weekWins"); ww.innerHTML="";
    if(!all.length){ ww.innerHTML='<li class="empty">Your week\'s wins compile here as you log them.</li>'; }
    all.forEach(win=>{
      const li=document.createElement("li"); li.className="item";
      li.innerHTML='<span class="itxt">'+esc(win.text)+'<div class="winmeta">'+win.dow+'</div></span>';
      ww.appendChild(li);
    });

    renderBadges(w,{winCount,daysLogged,avg,goalsDone,dates});
  }

  function renderBadges(w,ctx){
    const days=ctx.dates.map(d=>w.days[dKey(d)]);
    const ratings=Object.values(w.days).map(d=>d.rating);
    let streak=0,best=0;
    days.forEach(d=>{ if(d&&(d.rating!=null||(d.wins&&d.wins.length))){streak++;best=Math.max(best,streak);} else streak=0; });
    const defs=[
      {ic:"🥇",bn:"First Win",on:ctx.winCount>=1},
      {ic:"🎚️",bn:"On Rhythm · 3 days",on:ctx.daysLogged>=3},
      {ic:"🔥",bn:"Momentum · 3 in a row",on:best>=3},
      {ic:"💯",bn:"Peak Day · 10",on:ratings.some(r=>r===10)},
      {ic:"🎯",bn:"Targets Cleared",on:w.goals.length>0&&ctx.goalsDone===w.goals.length},
      {ic:"⚡",bn:"Full Sequence · 7/7",on:ctx.daysLogged===7},
    ];
    const b=document.getElementById("badges"); b.innerHTML="";
    defs.forEach(d=>{ const el=document.createElement("div"); el.className="badge"+(d.on?" earned":""); el.innerHTML='<div class="ic">'+d.ic+'</div><div class="bn">'+d.bn+'</div>'; b.appendChild(el); });
  }

  function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

  let savedT;
  function flashSaved(ok){
    const s=document.getElementById("saveStat"), txt=document.getElementById("saveTxt"); if(!s) return;
    if(ok){ s.className="rec saved"; txt.textContent="Saved \u2713"; clearTimeout(savedT); savedT=setTimeout(()=>{ s.className="rec"; txt.textContent="Live"; },1500); }
    else { s.className="rec blocked"; txt.textContent="Not saved"; }
  }
  function showBlocked(){
    const b=document.getElementById("banner"); if(!b) return;
    b.innerHTML='<b>This device is blocking storage, so entries can\u2019t be saved.</b> Open iOS <b>Settings \u2192 Apps \u2192 Safari</b>, and under Privacy &amp; Security turn <b>off</b> \u201CBlock All Cookies.\u201D Also make sure you\u2019re not in a Private tab. Then reopen this app.';
    b.classList.add("show");
  }
  function storageProbe(){ try{ const t="__rt_probe__"; localStorage.setItem(t,"1"); const ok=localStorage.getItem(t)==="1"; localStorage.removeItem(t); if(!ok) showBlocked(); return ok; }catch(e){ showBlocked(); return false; } }

  function exportData(){
    const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"}); const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download="rhythm-tracker-backup-"+todayKey()+".json";
    document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1000); toast("Backup exported");
  }
  function importData(file){
    const r=new FileReader();
    r.onload=()=>{ try{ const data=JSON.parse(r.result); if(data&&data.weeks){ state=data; save(); render(); toast("Backup restored"); } else toast("Not a valid backup"); }catch(e){ toast("Couldn't read file"); } };
    r.readAsText(file);
  }

  let toastT;
  function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),1600); }

  // ---------- theme ----------
  function applyTheme(t){
    document.documentElement.setAttribute("data-theme",t);
    const btn=document.getElementById("themeBtn"); if(btn) btn.textContent = t==="dark" ? "☀ Light" : "☾ Dark";
    const meta=document.querySelector('meta[name="theme-color"]'); if(meta) meta.setAttribute("content", t==="dark" ? "#0A1222" : "#E7EDF7");
  }
  function toggleTheme(){
    const cur=document.documentElement.getAttribute("data-theme")==="light"?"light":"dark";
    const next=cur==="dark"?"light":"dark";
    try{ localStorage.setItem(THEME_KEY,next); }catch(e){}
    applyTheme(next);
  }

  function shiftWeek(n){
    const nv=new Date(viewDate); nv.setDate(nv.getDate()+n*7);
    if(n>0 && weeksFromNow(nv)>12) return;
    viewDate=nv;
    selDate = weekKey(viewDate)===weekKey(new Date()) ? todayKey() : dKey(weekDates(viewDate)[0]);
    render();
  }
  document.getElementById("prevWk").onclick=()=>shiftWeek(-1);
  document.getElementById("nextWk").onclick=()=>shiftWeek(1);
  document.getElementById("goalAdd").onclick=()=>{ const i=document.getElementById("goalIn"); addGoal(i.value); i.value=""; };
  document.getElementById("goalIn").addEventListener("keydown",e=>{ if(e.key==="Enter"){ addGoal(e.target.value); e.target.value=""; }});
  document.getElementById("winAdd").onclick=()=>{ const i=document.getElementById("winIn"); addWin(i.value); i.value=""; };
  document.getElementById("winIn").addEventListener("keydown",e=>{ if(e.key==="Enter"){ addWin(e.target.value); e.target.value=""; }});
  document.getElementById("rateClr").onclick=clearRating;
  document.getElementById("exportBtn").onclick=exportData;
  document.getElementById("importBtn").onclick=()=>document.getElementById("fileIn").click();
  document.getElementById("fileIn").addEventListener("change",e=>{ if(e.target.files[0]) importData(e.target.files[0]); e.target.value=""; });
  document.getElementById("themeBtn").onclick=toggleTheme;

  applyTheme(document.documentElement.getAttribute("data-theme")==="light"?"light":"dark");
  if(navigator.storage && navigator.storage.persist){ try{ navigator.storage.persist(); }catch(e){} }
  storageProbe();
  render();
})();
</script>
</body>
</html>
