<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rhythm">
<meta name="theme-color" content="#15120F">
<title>UNO Smalls Rhythm Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Sora:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#15120F;
    --panel:#211C17;
    --panel-2:#2B241D;
    --line:rgba(255,255,255,.07);
    --amber:#FFA62B;
    --amber-dim:#5e451f;
    --cyan:#34D1C0;
    --cyan-dim:#1f4d49;
    --text:#F4EDE0;
    --muted:#9A8F80;
    --bad:#e2603f;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(120% 60% at 50% -10%, #241d16 0%, transparent 55%),
      var(--bg);
    color:var(--text);
    font-family:'Sora',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    padding:
      calc(env(safe-area-inset-top) + 18px)
      calc(env(safe-area-inset-right) + 16px)
      calc(env(safe-area-inset-bottom) + 40px)
      calc(env(safe-area-inset-left) + 16px);
  }
  .wrap{max-width:480px;margin:0 auto;}

  /* ---------- header ---------- */
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
  .mark{line-height:.82;}
  .mark .uno{
    font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.32em;
    color:var(--muted);display:block;margin-bottom:7px;text-transform:uppercase;
  }
  .mark .rhythm{
    font-family:'Anton',sans-serif;font-size:40px;letter-spacing:.01em;text-transform:uppercase;
    color:var(--text);
  }
  .mark .rhythm b{color:var(--amber);font-weight:400;}
  .rec{
    font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.18em;color:var(--muted);
    display:flex;align-items:center;gap:6px;text-transform:uppercase;
  }
  .rec .dot{width:8px;height:8px;border-radius:50%;background:var(--amber);box-shadow:0 0 10px var(--amber);animation:pulse 2s infinite;}

  /* ---------- week meta / nav ---------- */
  .weekbar{
    display:flex;align-items:center;justify-content:space-between;
    font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.12em;
    color:var(--muted);text-transform:uppercase;margin:4px 0 16px;
  }
  .navbtn{
    background:var(--panel);border:1px solid var(--line);color:var(--text);
    width:34px;height:30px;border-radius:8px;font-size:15px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .navbtn:active{background:var(--panel-2);}
  .navbtn:disabled{opacity:.3;}
  .weeklabel{text-align:center;flex:1;}
  .weeklabel .wk{color:var(--amber);}

  /* ---------- sequencer ---------- */
  .seq{
    display:grid;grid-template-columns:repeat(7,1fr);gap:7px;margin-bottom:22px;
  }
  .step{
    background:var(--panel);border:1px solid var(--line);border-radius:11px;
    padding:9px 0 8px;text-align:center;cursor:pointer;position:relative;
    transition:border-color .15s, background .15s;
  }
  .step .dow{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.05em;}
  .step .dom{font-family:'Sora',sans-serif;font-size:16px;font-weight:600;margin-top:2px;}
  .step .led{
    width:7px;height:7px;border-radius:50%;background:#3a322a;margin:7px auto 0;
    transition:background .2s, box-shadow .2s;
  }
  .step.logged .led{background:var(--amber);box-shadow:0 0 9px var(--amber);}
  .step.sel{border-color:var(--amber);background:var(--panel-2);}
  .step.today .dow{color:var(--amber);}
  .step.today::after{
    content:"";position:absolute;inset:-1px;border-radius:11px;
    border:1px solid var(--amber);opacity:.35;animation:pulse 2.4s infinite;pointer-events:none;
  }

  /* ---------- readout ---------- */
  .readout{
    background:linear-gradient(180deg,var(--panel-2),var(--panel));
    border:1px solid var(--line);border-radius:18px;padding:20px 18px 16px;margin-bottom:18px;
  }
  .readout .lbl{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.28em;color:var(--muted);text-transform:uppercase;}
  .bigscore{display:flex;align-items:baseline;gap:8px;margin-top:6px;}
  .bigscore .n{font-family:'Anton',sans-serif;font-size:64px;line-height:.9;color:var(--amber);}
  .bigscore .d{font-family:'Space Mono',monospace;font-size:16px;color:var(--muted);}
  .meter{height:6px;border-radius:4px;background:#352d24;overflow:hidden;margin:14px 0 16px;}
  .meter .fill{height:100%;background:linear-gradient(90deg,var(--amber),#ffd27a);border-radius:4px;transition:width .4s ease;}
  .substats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .stat{text-align:left;}
  .stat .sv{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--text);}
  .stat .sl{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;margin-top:3px;}

  /* ---------- panels ---------- */
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:16px;}
  .panel h2{
    font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.2em;color:var(--muted);
    text-transform:uppercase;margin:0 0 13px;font-weight:700;display:flex;justify-content:space-between;align-items:center;
  }
  .panel h2 .cnt{color:var(--amber);}

  .row{display:flex;gap:9px;margin-bottom:11px;}
  input[type=text]{
    flex:1;background:var(--bg);border:1px solid var(--line);border-radius:10px;
    color:var(--text);font-family:'Sora',sans-serif;font-size:15px;padding:11px 12px;outline:none;
  }
  input[type=text]:focus{border-color:var(--amber-dim);}
  input::placeholder{color:#6b6256;}
  .add{
    background:var(--amber);color:#1a1206;border:none;border-radius:10px;padding:0 16px;
    font-family:'Sora',sans-serif;font-weight:700;font-size:14px;cursor:pointer;
  }
  .add:active{filter:brightness(.92);}

  ul{list-style:none;margin:0;padding:0;}
  .item{display:flex;align-items:flex-start;gap:11px;padding:10px 0;border-top:1px solid var(--line);}
  .item:first-child{border-top:none;}
  .check{
    flex:none;width:22px;height:22px;border-radius:7px;border:1.5px solid #4a4035;background:transparent;
    cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;
  }
  .check.on{background:var(--amber);border-color:var(--amber);color:#1a1206;font-weight:700;}
  .itxt{flex:1;font-size:15px;line-height:1.35;}
  .item.done .itxt{color:var(--muted);text-decoration:line-through;}
  .del{flex:none;background:none;border:none;color:#5c5347;font-size:18px;cursor:pointer;padding:0 2px;line-height:1;}
  .del:active{color:var(--bad);}
  .winmeta{font-family:'Space Mono',monospace;font-size:10px;color:var(--amber);letter-spacing:.08em;margin-top:3px;}
  .empty{color:#6b6256;font-size:14px;line-height:1.45;padding:4px 0 2px;}

  /* ---------- rating meter ---------- */
  .rate{display:grid;grid-template-columns:repeat(10,1fr);gap:5px;margin:2px 0 4px;}
  .pad{
    height:34px;border-radius:8px;background:#2a2319;border:1px solid var(--line);cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-family:'Space Mono',monospace;font-size:11px;color:#6b6256;transition:background .12s,color .12s;
  }
  .pad.lit{background:var(--cyan);border-color:var(--cyan);color:#06231f;font-weight:700;}
  .pad.tip{box-shadow:0 0 10px var(--cyan);}
  .ratehint{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.1em;margin-top:9px;text-transform:uppercase;}
  .ratehint b{color:var(--cyan);}
  .clr{background:none;border:none;color:#6b6256;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.1em;cursor:pointer;text-transform:uppercase;text-decoration:underline;}

  /* ---------- trophies ---------- */
  .badges{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
  .badge{
    background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:11px 8px;text-align:center;opacity:.4;
    transition:opacity .2s;
  }
  .badge.earned{opacity:1;border-color:var(--amber-dim);background:linear-gradient(180deg,#2b2319,var(--panel));}
  .badge .ic{font-size:20px;}
  .badge .bn{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;margin-top:5px;line-height:1.25;}
  .badge.earned .bn{color:var(--text);}

  /* ---------- footer / backup ---------- */
  .tools{display:flex;gap:9px;margin-top:22px;}
  .tool{
    flex:1;background:var(--panel);border:1px solid var(--line);color:var(--muted);border-radius:11px;
    padding:12px 6px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.1em;
    text-transform:uppercase;cursor:pointer;text-align:center;
  }
  .tool:active{background:var(--panel-2);color:var(--text);}
  .sig{text-align:center;font-family:'Space Mono',monospace;font-size:10px;color:#5c5347;letter-spacing:.18em;margin-top:22px;text-transform:uppercase;}
  .toast{
    position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 24px);transform:translateX(-50%) translateY(20px);
    background:var(--amber);color:#1a1206;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;
    padding:11px 18px;border-radius:30px;opacity:0;pointer-events:none;transition:.25s;letter-spacing:.05em;z-index:50;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
  @media (prefers-reduced-motion: reduce){*{animation:none !important;}}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="mark">
      <span class="uno">Uno Smalls</span>
      <span class="rhythm"><b>Rhythm</b> Tracker</span>
    </div>
    <div class="rec"><span class="dot"></span>Live</div>
  </div>

  <div class="weekbar">
    <button class="navbtn" id="prevWk">‹</button>
    <div class="weeklabel"><span class="wk" id="wkNum"></span> · <span id="wkRange"></span></div>
    <button class="navbtn" id="nextWk">›</button>
  </div>

  <div class="seq" id="seq"></div>

  <div class="readout">
    <div class="lbl">Week Rhythm</div>
    <div class="bigscore"><span class="n" id="weekScore">—</span><span class="d">/ 10</span></div>
    <div class="meter"><div class="fill" id="weekFill" style="width:0%"></div></div>
    <div class="substats">
      <div class="stat"><div class="sv" id="stWins">0</div><div class="sl">Wins</div></div>
      <div class="stat"><div class="sv" id="stGoals">0/0</div><div class="sl">Targets</div></div>
      <div class="stat"><div class="sv" id="stDays">0/7</div><div class="sl">Days Logged</div></div>
    </div>
  </div>

  <div class="panel">
    <h2>Week Targets <span class="cnt" id="goalCnt"></span></h2>
    <div class="row">
      <input type="text" id="goalIn" placeholder="What has to happen this week?">
      <button class="add" id="goalAdd">Set</button>
    </div>
    <ul id="goalList"></ul>
  </div>

  <div class="panel">
    <h2 id="dayTitle">Today</h2>
    <div class="lbl" style="font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.24em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;">Rate the day</div>
    <div class="rate" id="rate"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div class="ratehint" id="rateHint">Tap to set</div>
      <button class="clr" id="rateClr" style="display:none;">Clear</button>
    </div>
    <div style="height:14px;"></div>
    <div class="row">
      <input type="text" id="winIn" placeholder="Log a win…">
      <button class="add" id="winAdd">Add</button>
    </div>
    <ul id="dayWins"></ul>
  </div>

  <div class="panel">
    <h2>Week Wins <span class="cnt" id="winTotal"></span></h2>
    <ul id="weekWins"></ul>
  </div>

  <div class="panel">
    <h2>Trophies</h2>
    <div class="badges" id="badges"></div>
  </div>

  <div class="tools">
    <button class="tool" id="exportBtn">⤓ Export backup</button>
    <button class="tool" id="importBtn">⤒ Import</button>
  </div>
  <input type="file" id="fileIn" accept="application/json" style="display:none;">

  <div class="sig">Change your world · 31</div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  const KEY = "uno-rhythm-tracker-v1";
  const DOW = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

  // ---------- state ----------
  let state = load();
  let viewDate = new Date();          // any date inside the viewed week
  let selDate = todayKey();           // selected day (YYYY-MM-DD)

  function load(){
    try{ const r = localStorage.getItem(KEY); if(r) return JSON.parse(r); }catch(e){}
    return { weeks:{} };
  }
  function save(){
    try{ localStorage.setItem(KEY, JSON.stringify(state)); }
    catch(e){ toast("Storage blocked"); }
  }

  // ---------- date helpers ----------
  function todayKey(){ return dKey(new Date()); }
  function dKey(d){ const x=new Date(d); return x.getFullYear()+"-"+pad(x.getMonth()+1)+"-"+pad(x.getDate()); }
  function pad(n){ return String(n).padStart(2,"0"); }
  function startOfWeek(d){ const x=new Date(d); x.setHours(0,0,0,0); const day=(x.getDay()+6)%7; x.setDate(x.getDate()-day); return x; }
  function weekDates(d){ const s=startOfWeek(d); return Array.from({length:7},(_,i)=>{ const x=new Date(s); x.setDate(s.getDate()+i); return x; }); }
  function isoWeek(d){
    const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
    const dn=(date.getUTCDay()+6)%7; date.setUTCDate(date.getUTCDate()-dn+3);
    const ft=new Date(Date.UTC(date.getUTCFullYear(),0,4));
    const fdn=(ft.getUTCDay()+6)%7; ft.setUTCDate(ft.getUTCDate()-fdn+3);
    return { year:date.getUTCFullYear(), week:1+Math.round((date-ft)/(7*864e5)) };
  }
  function weekKey(d){ const w=isoWeek(d); return w.year+"-W"+pad(w.week); }

  function getWeek(){
    const k=weekKey(viewDate);
    if(!state.weeks[k]) state.weeks[k]={ goals:[], days:{} };
    return state.weeks[k];
  }
  function getDay(key){
    const w=getWeek();
    if(!w.days[key]) w.days[key]={ rating:null, wins:[] };
    return w.days[key];
  }

  // ---------- mutations ----------
  function addGoal(t){ t=t.trim(); if(!t) return; getWeek().goals.push({id:uid(),text:t,done:false}); save(); render(); }
  function toggleGoal(id){ const g=getWeek().goals.find(x=>x.id===id); if(g){g.done=!g.done; save(); render();} }
  function delGoal(id){ const w=getWeek(); w.goals=w.goals.filter(x=>x.id!==id); save(); render(); }

  function setRating(n){ const d=getDay(selDate); d.rating = (d.rating===n)?null:n; save(); render(); }
  function clearRating(){ getDay(selDate).rating=null; save(); render(); }

  function addWin(t){ t=t.trim(); if(!t) return; getDay(selDate).wins.push({id:uid(),text:t,ts:Date.now()}); save(); render(); }
  function delWin(key,id){ const d=getDay(key); d.wins=d.wins.filter(x=>x.id!==id); save(); render(); }

  function uid(){ return Math.random().toString(36).slice(2,9); }

  // ---------- render ----------
  function render(){
    const w=getWeek();
    const dates=weekDates(viewDate);
    const iw=isoWeek(viewDate);

    // week meta
    document.getElementById("wkNum").textContent="WK "+iw.week;
    const m=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
    const a=dates[0], b=dates[6];
    document.getElementById("wkRange").textContent =
      m[a.getMonth()]+" "+a.getDate()+"–"+(a.getMonth()===b.getMonth()?b.getDate():m[b.getMonth()]+" "+b.getDate());
    document.getElementById("nextWk").disabled = weekKey(viewDate)===weekKey(new Date());

    // sequencer
    const seq=document.getElementById("seq"); seq.innerHTML="";
    dates.forEach((d,i)=>{
      const key=dKey(d);
      const day=w.days[key];
      const logged = day && (day.rating!=null || (day.wins&&day.wins.length));
      const el=document.createElement("div");
      el.className="step"+(logged?" logged":"")+(key===selDate?" sel":"")+(key===todayKey()?" today":"");
      el.innerHTML='<div class="dow">'+DOW[i]+'</div><div class="dom">'+d.getDate()+'</div><div class="led"></div>';
      el.onclick=()=>{ selDate=key; render(); };
      seq.appendChild(el);
    });

    // week score
    const rated=Object.values(w.days).filter(d=>d.rating!=null);
    const avg = rated.length ? rated.reduce((s,d)=>s+d.rating,0)/rated.length : null;
    document.getElementById("weekScore").textContent = avg==null ? "—" : avg.toFixed(1);
    document.getElementById("weekFill").style.width = (avg==null?0:avg*10)+"%";

    const winCount=Object.values(w.days).reduce((s,d)=>s+(d.wins?d.wins.length:0),0);
    const goalsDone=w.goals.filter(g=>g.done).length;
    const daysLogged=Object.values(w.days).filter(d=>d.rating!=null||(d.wins&&d.wins.length)).length;
    document.getElementById("stWins").textContent=winCount;
    document.getElementById("stGoals").textContent=goalsDone+"/"+w.goals.length;
    document.getElementById("stDays").textContent=daysLogged+"/7";

    // goals
    document.getElementById("goalCnt").textContent = w.goals.length?goalsDone+"/"+w.goals.length:"";
    const gl=document.getElementById("goalList"); gl.innerHTML="";
    if(!w.goals.length){ gl.innerHTML='<li class="empty">No targets yet. Contact that artist. Finish that patch. Name it.</li>'; }
    w.goals.forEach(g=>{
      const li=document.createElement("li");
      li.className="item"+(g.done?" done":"");
      li.innerHTML='<button class="check'+(g.done?" on":"")+'">'+(g.done?"✓":"")+'</button><span class="itxt">'+esc(g.text)+'</span><button class="del">×</button>';
      li.querySelector(".check").onclick=()=>toggleGoal(g.id);
      li.querySelector(".del").onclick=()=>delGoal(g.id);
      gl.appendChild(li);
    });

    // day title
    const isToday=selDate===todayKey();
    const sd=new Date(selDate+"T00:00:00");
    document.getElementById("dayTitle").innerHTML = isToday ? "Today" :
      DOW[(sd.getDay()+6)%7]+" · "+m[sd.getMonth()]+" "+sd.getDate();

    // rating
    const dayObj=w.days[selDate]||{rating:null,wins:[]};
    const rate=document.getElementById("rate"); rate.innerHTML="";
    for(let i=1;i<=10;i++){
      const p=document.createElement("div");
      const lit = dayObj.rating!=null && i<=dayObj.rating;
      p.className="pad"+(lit?" lit":"")+(dayObj.rating===i?" tip":"");
      p.textContent=i;
      p.onclick=()=>setRating(i);
      rate.appendChild(p);
    }
    const hint=document.getElementById("rateHint");
    hint.innerHTML = dayObj.rating==null ? "Tap to set" : "Rated <b>"+dayObj.rating+"</b> / 10";
    document.getElementById("rateClr").style.display = dayObj.rating==null?"none":"block";

    // day wins
    const dw=document.getElementById("dayWins"); dw.innerHTML="";
    if(!dayObj.wins.length){ dw.innerHTML='<li class="empty">No wins logged. Stack the first one.</li>'; }
    dayObj.wins.slice().reverse().forEach(win=>{
      const li=document.createElement("li");
      li.className="item";
      li.innerHTML='<span class="itxt">'+esc(win.text)+'</span><button class="del">×</button>';
      li.querySelector(".del").onclick=()=>delWin(selDate,win.id);
      dw.appendChild(li);
    });

    // week wins feed
    const all=[];
    dates.forEach((d,i)=>{ const key=dKey(d); const day=w.days[key]; if(day&&day.wins) day.wins.forEach(win=>all.push({...win,dow:DOW[i]})); });
    all.sort((x,y)=>y.ts-x.ts);
    document.getElementById("winTotal").textContent = all.length?all.length:"";
    const ww=document.getElementById("weekWins"); ww.innerHTML="";
    if(!all.length){ ww.innerHTML='<li class="empty">Your week\'s wins compile here as you log them.</li>'; }
    all.forEach(win=>{
      const li=document.createElement("li");
      li.className="item";
      li.innerHTML='<span class="itxt">'+esc(win.text)+'<div class="winmeta">'+win.dow+'</div></span>';
      ww.appendChild(li);
    });

    // trophies
    renderBadges(w,{winCount,daysLogged,avg,goalsDone,dates});
  }

  function renderBadges(w,ctx){
    const days=ctx.dates.map(d=>w.days[dKey(d)]);
    const ratings=Object.values(w.days).map(d=>d.rating);
    // streak: consecutive logged days
    let streak=0,best=0;
    days.forEach(d=>{ if(d&&(d.rating!=null||(d.wins&&d.wins.length))){streak++;best=Math.max(best,streak);} else streak=0; });
    const defs=[
      {ic:"🥇",bn:"First Win",on:ctx.winCount>=1},
      {ic:"🎚️",bn:"On Rhythm · 3 days",on:ctx.daysLogged>=3},
      {ic:"🔥",bn:"Momentum · 3 in a row",on:best>=3},
      {ic:"💯",bn:"Peak Day · 10",on:ratings.some(r=>r===10)},
      {ic:"🎯",bn:"Targets Cleared",on:w.goals.length>0&&ctx.goalsDone===w.goals.length},
      {ic:"⚡",bn:"Full Sequence · 7/7",on:ctx.daysLogged===7},
    ];
    const b=document.getElementById("badges"); b.innerHTML="";
    defs.forEach(d=>{
      const el=document.createElement("div");
      el.className="badge"+(d.on?" earned":"");
      el.innerHTML='<div class="ic">'+d.ic+'</div><div class="bn">'+d.bn+'</div>';
      b.appendChild(el);
    });
  }

  function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

  // ---------- backup ----------
  function exportData(){
    const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download="rhythm-tracker-backup-"+todayKey()+".json";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    toast("Backup exported");
  }
  function importData(file){
    const r=new FileReader();
    r.onload=()=>{
      try{
        const data=JSON.parse(r.result);
        if(data&&data.weeks){ state=data; save(); render(); toast("Backup restored"); }
        else toast("Not a valid backup");
      }catch(e){ toast("Couldn't read file"); }
    };
    r.readAsText(file);
  }

  let toastT;
  function toast(msg){
    const t=document.getElementById("toast");
    t.textContent=msg; t.classList.add("show");
    clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),1800);
  }

  // ---------- events ----------
  document.getElementById("prevWk").onclick=()=>{ viewDate.setDate(viewDate.getDate()-7); selDate=dKey(weekDates(viewDate)[0]); render(); };
  document.getElementById("nextWk").onclick=()=>{ const n=new Date(viewDate); n.setDate(n.getDate()+7); if(weekKey(n)===weekKey(new Date())||n<new Date()){ viewDate=n; selDate = weekKey(viewDate)===weekKey(new Date())?todayKey():dKey(weekDates(viewDate)[0]); render(); } };

  document.getElementById("goalAdd").onclick=()=>{ const i=document.getElementById("goalIn"); addGoal(i.value); i.value=""; };
  document.getElementById("goalIn").addEventListener("keydown",e=>{ if(e.key==="Enter"){ addGoal(e.target.value); e.target.value=""; }});

  document.getElementById("winAdd").onclick=()=>{ const i=document.getElementById("winIn"); addWin(i.value); i.value=""; };
  document.getElementById("winIn").addEventListener("keydown",e=>{ if(e.key==="Enter"){ addWin(e.target.value); e.target.value=""; }});

  document.getElementById("rateClr").onclick=clearRating;
  document.getElementById("exportBtn").onclick=exportData;
  document.getElementById("importBtn").onclick=()=>document.getElementById("fileIn").click();
  document.getElementById("fileIn").addEventListener("change",e=>{ if(e.target.files[0]) importData(e.target.files[0]); e.target.value=""; });

  render();
})();
</script>
</body>
</html>
